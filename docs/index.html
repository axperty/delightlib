<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delight Lib Wiki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --heading-font-family: 'Outfit', sans-serif;
            --code-font-family: 'JetBrains Mono', monospace;
            --base-font-size: 16px;
            --sidebar-width: 300px;
            --content-max-width: 60em;
            --theme-color: #6bb2ff;
            --theme-color-hover: #ffffff;
            --base-background: #195392;
            --content-background: #195392;
            --sidebar-background: #195392;
            --base-color: #ffffff;
            --heading-color: #6bb2ff;
            --sidebar-name-color: #6bb2ff;
            --sidebar-toggle-color: #6bb2ff;
            --link-color: #6bb2ff;
            --link-color--hover: #ffffff;
            --link-text-decoration: none;
            --link-text-decoration--hover: underline;
            --sidebar-nav-link-color: #ffffff;
            --sidebar-nav-link-color--active: #6bb2ff;
            --sidebar-nav-link-background--active: rgba(107, 178, 255, 0.1);
            --base-border-color: #6bb2ff;
            --sidebar-border-color: #6bb2ff;
            --hr-border-color: #6bb2ff;
            --table-border-color: #6bb2ff;
            --code-block-background: #0f3866;
            --code-block-color: #ffffff;
            --code-inline-background: #0f3866;
            --code-inline-color: #6bb2ff;
            --code-inline-border-radius: 6px;
            --table-header-background: #0f3866;
            --table-cell-border-color: #6bb2ff;
            --table-row-odd-background: #0f3866;
            --table-row-even-background: #195392;
        }
        body {
            font-family: var(--base-font-family);
            background-color: var(--base-background);
            color: var(--base-color);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--heading-font-family);
            font-weight: 700;
            color: var(--heading-color);
            letter-spacing: -0.02em;
            margin-top: 2rem;
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        h1 { font-size: 2.25rem; font-weight: 800; border-bottom: 2px solid #6bb2ff; padding-bottom: 0.5rem; }
        h2 { font-size: 1.75rem; border-bottom: 1px solid #6bb2ff; padding-bottom: 0.4rem; }
        h3 { font-size: 1.4rem; }
        h4 { font-size: 1.15rem; }
        .markdown-section a {
            font-weight: 500;
            color: var(--theme-color);
            text-decoration: none;
            border-bottom: 1px dashed rgba(107, 178, 255, 0.4);
            transition: all 0.2s ease;
        }
        .markdown-section a:hover {
            color: var(--theme-color-hover);
            border-bottom-style: solid;
            border-bottom-color: var(--theme-color-hover);
        }
        .sidebar {
            background-color: var(--sidebar-background);
            border-right: 1px solid var(--sidebar-border-color);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
        }
        .sidebar-toggle {
            background: rgba(25, 83, 146, 0.8) !important;
            backdrop-filter: blur(8px);
            border-radius: 0 8px 8px 0;
            border: 1px solid var(--base-border-color);
            border-left: none;
            padding: 10px 14px 10px 10px !important;
            bottom: auto !important;
            top: 20px;
            left: 0 !important;
            transition: all 0.2s ease;
        }
        .sidebar-toggle span {
            background-color: var(--theme-color) !important;
        }
        .sidebar-toggle:hover {
            transform: translateX(4px);
        }
        .sidebar .app-name {
            font-family: var(--heading-font-family);
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            color: var(--theme-color);
            letter-spacing: 0.05em;
            margin: 2rem 0 1rem 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(107, 178, 255, 0.25);
        }
        .search {
            padding: 10px 15px !important;
            border-bottom: 1px solid #6bb2ff;
        }
        .search input {
            border-radius: 12px !important;
            border: 1px solid #6bb2ff !important;
            background: #0f3866 !important;
            padding: 10px 16px 10px 36px !important;
            font-family: var(--base-font-family) !important;
            font-size: 0.9rem !important;
            color: var(--base-color) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2) !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        .search input:focus {
            border-color: #ffffff !important;
            box-shadow: 0 0 12px rgba(107, 178, 255, 0.2), inset 0 2px 4px rgba(0,0,0,0.2) !important;
        }
        .search .clear-button {
            color: #ffffff !important;
            cursor: pointer;
        }
        .sidebar-nav ul {
            padding-left: 0;
            margin: 0;
        }
        .sidebar-nav li {
            margin: 4px 0 !important;
            list-style: none;
        }
        .sidebar-nav a {
            font-family: var(--heading-font-family);
            font-weight: 500;
            padding: 8px 24px 8px 16px !important;
            border-left: 3px solid transparent;
            transition: all 0.25s ease !important;
            border-radius: 0 8px 8px 0;
            margin-right: 12px;
            display: block;
            font-size: 0.95rem;
            text-decoration: none !important;
        }
        .sidebar-nav a:hover {
            color: var(--theme-color) !important;
            background-color: rgba(107, 178, 255, 0.04);
            transform: translateX(4px);
        }
        .sidebar-nav li.active > a {
            font-weight: 700;
            color: var(--theme-color) !important;
            border-left: 3px solid var(--theme-color);
            background: linear-gradient(90deg, rgba(107, 178, 255, 0.1) 0%, rgba(107, 178, 255, 0) 100%) !important;
        }
        .markdown-section {
            max-width: var(--content-max-width) !important;
            padding: 2rem 15px 4rem 15px !important;
        }
        img[alt="Delight Lib"] {
            display: block;
            margin: 2rem auto !important;
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 25px rgba(107, 178, 255, 0.08);
            border: 1px solid rgba(107, 178, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        img[alt="Delight Lib"]:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.55), 0 0 35px rgba(107, 178, 255, 0.22);
            border-color: rgba(107, 178, 255, 0.35);
        }
        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(107, 178, 255, 0.1), #6bb2ff, rgba(107, 178, 255, 0.1));
            margin: 3rem 0;
        }
        .lang-switcher {
            display: flex;
            gap: 16px;
            margin: 2.5rem 0;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 12px 24px;
            border: 1px solid rgba(107, 178, 255, 0.25) !important;
            border-radius: 10px;
            background: linear-gradient(135deg, #0f3866, #195392);
            color: #ffffff !important;
            text-decoration: none !important;
            font-weight: 600;
            font-family: var(--heading-font-family);
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .lang-btn:hover {
            background: linear-gradient(135deg, #6bb2ff, #ffffff) !important;
            color: #195392 !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 178, 255, 0.3);
            border-color: var(--theme-color) !important;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 2.5rem 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #6bb2ff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            font-size: 0.95rem;
        }
        th {
            background-color: #0f3866 !important;
            color: #ffffff;
            font-family: var(--heading-font-family);
            font-weight: 600;
            padding: 14px 18px;
            text-align: left;
            border-bottom: 2px solid #6bb2ff !important;
        }
        td {
            padding: 14px 18px;
            border-bottom: 1px solid #6bb2ff !important;
            color: #ffffff;
            line-height: 1.5;
        }
        tr:last-child td {
            border-bottom: none !important;
        }
        tr:nth-child(even) {
            background-color: rgba(15, 56, 102, 0.4);
        }
        tr:hover td {
            background-color: rgba(107, 178, 255, 0.02);
        }
        blockquote {
            background: linear-gradient(to right, #0f3866, #195392);
            border-left: 4px solid var(--theme-color) !important;
            padding: 1.2rem 1.6rem;
            border-radius: 4px 14px 14px 4px;
            margin: 2.5rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: relative;
        }
        blockquote::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(107, 178, 255, 0.03) 0%, rgba(107, 178, 255, 0) 100%);
            pointer-events: none;
        }
        blockquote p {
            margin: 0;
            color: #ffffff;
            font-style: italic;
            line-height: 1.6;
            font-size: 1rem;
        }
        .markdown-section ul, .markdown-section ol {
            padding-left: 2rem;
            margin: 1.5rem 0;
        }
        .markdown-section li {
            margin: 0.6rem 0;
            line-height: 1.65;
            color: #ffffff;
        }
        .markdown-section strong {
            color: #ffffff;
            font-weight: 700;
        }
        code, pre {
            font-family: var(--code-font-family) !important;
        }
        code:not([class]) {
            background-color: var(--code-inline-background) !important;
            color: var(--code-inline-color) !important;
            padding: 3px 6px !important;
            border-radius: var(--code-inline-border-radius) !important;
            font-size: 0.9em !important;
            border: 1px solid rgba(107, 178, 255, 0.15);
            letter-spacing: -0.01em;
            word-break: break-word;
        }
        pre {
            background-color: var(--code-block-background) !important;
            border: 1px solid #6bb2ff !important;
            border-radius: 14px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
            padding: 1.25rem 1.5rem !important;
            margin: 2.5rem 0 !important;
            position: relative;
            overflow-x: auto;
        }
        pre code {
            background-color: transparent !important;
            color: var(--code-block-color) !important;
            font-size: 0.9rem !important;
            line-height: 1.6 !important;
            border: none !important;
            padding: 0 !important;
            display: block;
        }
        .token.comment, .token.prolog, .token.doctype, .token.cdata {
            color: #8da4be !important;
            font-style: italic;
        }
        .token.punctuation {
            color: #ffffff !important;
        }
        .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol, .token.deleted {
            color: #a8d1ff !important;
        }
        .token.selector, .token.attr-name, .token.string, .token.char, .token.builtin, .token.inserted {
            color: #d1e8ff !important;
        }
        .token.operator, .token.entity, .token.url, .language-css .token.string, .style .token.string {
            color: #84b7ff !important;
        }
        .token.atrule, .token.attr-value, .token.keyword, .token.class-name {
            color: #6bb2ff !important;
        }
        .token.function, .token.constant {
            color: #ffffff !important;
        }
        .token.regex, .token.important, .token.variable {
            color: #d1e8ff !important;
        }
        mark {
            background: rgba(107, 178, 255, 0.3) !important;
            color: #ffffff !important;
            border-radius: 3px;
            padding: 0 2px;
            border-bottom: 1px solid var(--theme-color);
        }
        .docsify-copy-code-button {
            background: #0f3866 !important;
            color: #ffffff !important;
            border: 1px solid #6bb2ff !important;
            border-radius: 6px !important;
            font-family: var(--heading-font-family) !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            padding: 6px 12px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
            outline: none !important;
        }
        .docsify-copy-code-button:hover {
            background: var(--theme-color) !important;
            color: #195392 !important;
            border-color: var(--theme-color) !important;
            transform: translateY(-1px) !important;
            box-shadow: 0 4px 12px rgba(107, 178, 255, 0.25) !important;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #195392;
        }
        ::-webkit-scrollbar-thumb {
            background: #6bb2ff;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffffff;
        }
    </style>
</head>
<body>
<div id="app">Loading documentation...</div>
<script>
    window.$docsify = {
        name: 'Delight Lib',
        repo: 'axperty/delightlib',
        loadSidebar: true,
        auto2top: true,
        maxLevel: 3,
        subMaxLevel: 2,
        nameLink: '#/'
    }
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-groovy.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
</body>
</html>
