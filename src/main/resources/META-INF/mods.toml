modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL = "https://github.com/axperty/delightlib/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL = "https://github.com/axperty/delightlib"
logoFile="assets/delightlib/logo.png"
logoBlur = false
authors="${mod_authors}"
description="A library mod for Farmer's Delight that aims to make other add-ons easily."

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="farmersdelight"
mandatory=true
versionRange="[0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="expandeddelight"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="casualness_delight"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"